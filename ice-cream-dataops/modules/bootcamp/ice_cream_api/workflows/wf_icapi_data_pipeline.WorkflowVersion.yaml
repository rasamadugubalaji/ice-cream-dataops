workflowExternalId: wf_icapi_data_pipeline
version: '1'
workflowDefinition:
  description: 'Run tasks in sequence'
  tasks:
  - externalId: oee_time_series_calculation_task
    type: function
    name: 'Task Four'
    description: Fourth task
    parameters:
      function:
        externalId: oee_timeseries
        data: { "hours": 1 }
    retries: 3
    timeout: 3600
    onFailure: abortWorkflow
    dependsOn:
      - externalId: icapi_datapoints_extractor_task

  - externalId: icapi_datapoints_extractor_task
    type: function
    name: 'Task Three'
    description: Third task
    parameters:
      function:
        externalId: icapi_datapoints_extractor
        data: { "hours": 1 }
    retries: 3
    timeout: 3600
    onFailure: abortWorkflow
    dependsOn:
      - externalId: contextualize_ts_assets_task
    
  - externalId: contextualize_ts_assets_task
    type: transformation
    name: 'Task Two'
    description: Second task
    parameters:
      transformation:
        externalId: contextualize_ts_assets
    retries: 3
    timeout: 3600
    onFailure: abortWorkflow 
    dependsOn:
      - externalId: create_asset_hierarchy_task

  - externalId: create_asset_hierarchy_task
    type: transformation
    name: 'Task One'
    description: First task
    parameters:
      transformation:
        externalId: create_asset_hierarchy
    retries: 3
    timeout: 3600
    onFailure: abortWorkflow
    

